server:
  port: 8081

spring:
  application:
    name: orders-reactive

  r2dbc:
    url: r2dbc:mysql://${DB_HOST:localhost}:${DB_PORT:3307}/${DB_NAME:orders_db}?useServerPrepareStatement=true&serverZoneId=UTC
    username: ${DB_USERNAME:orders_user}
    password: ${DB_PASSWORD:orders_pass}

  jackson:
    serialization:
      indent_output: true

logging:
  level:
    org.springframework.r2dbc: DEBUG
